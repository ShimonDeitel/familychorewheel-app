name: FamilyChoreWheel
options:
  bundleIdPrefix: com.shimondeitel.familychorewheel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  FamilyChoreWheel:
    type: application
    platform: iOS
    sources:
      - path: FamilyChoreWheel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.familychorewheel
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: FamilyChoreWheel/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FamilyChoreWheelTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FamilyChoreWheelTests
      - path: FamilyChoreWheel.storekit
    dependencies:
      - target: FamilyChoreWheel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.familychorewheel.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FamilyChoreWheelUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FamilyChoreWheelUITests
    dependencies:
      - target: FamilyChoreWheel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.familychorewheel.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  FamilyChoreWheel:
    build:
      targets:
        FamilyChoreWheel: all
        FamilyChoreWheelTests: [test]
        FamilyChoreWheelUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: FamilyChoreWheel.storekit
    test:
      config: Debug
      storeKitConfiguration: FamilyChoreWheel.storekit
      targets:
        - FamilyChoreWheelTests
        - FamilyChoreWheelUITests
    archive:
      config: Release
